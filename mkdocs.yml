extra_css:
  - stylesheets/extra.css

nav:
  - Inicio: index.md
  - Quiénes Somos: quienes-somos.md
  - Publicaciones: publicaciones.md
  - Investigación: investigacion.md
  - Transferencia de conocimiento: transferencia_conocimiento.md
  - Contacto: contacto.md